<!DOCTYPE html>
<html>
<head>
  <title>Interactive AI Page</title>
  <style>
    body { font-family: Arial; background: #f5f5f5; padding: 20px; }
    #chatBox { max-width: 700px; margin: auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    #messages { min-height: 200px; border: 1px solid #ddd; padding: 10px; border-radius: 8px; margin-bottom: 10px; background: #f9f9f9; overflow-y: auto; max-height: 350px; }
    input[type=text], select { width: 70%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 10px; }
    button { padding: 10px 15px; border: none; background: #007bff; color: white; border-radius: 8px; cursor: pointer; margin-left: 5px; }
    button:hover { background: #0056b3; }
    img { max-width: 100%; margin-top: 10px; border-radius: 8px; }
    label { font-weight: bold; }
  </style>
</head>
<body>

<div id="chatBox">
  <h2>Interactive AI Page</h2>

  <div>
    <label>Select Model:</label>
    <select id="modelSelect">
      <option value="claude-sonnet-4-6">Claude Sonnet 4.6</option>
      <option value="claude-opus-4-6">Claude Opus 4.6</option>
      <option value="claude-haiku-4-5">Claude Haiku 4.5</option>
      <option value="claude-opus-4-5">Claude Opus 4.5</option>
    </select>
  </div>

  <div id="messages">AI responses will appear here...</div>

  <div>
    <input type="text" id="userInput" placeholder="Type your message" />
    <button onclick="sendMessage()">Send</button>
  </div>

  <div>
    <label>Upload Text File:</label>
    <input type="file" id="fileInput" />
    <button onclick="uploadFile()">Send File</button>
  </div>

  <div>
    <label>Upload Image:</label>
    <input type="file" id="imageInput" accept="image/*" />
    <button onclick="uploadImage()">Send Image</button>
    <img id="preview" style="display:none;" />
  </div>
</div>

<script src="https://js.puter.com/v2/"></script>

<script>
async function sendMessage() {
    const input = document.getElementById("userInput").value.trim();
    if (!input) return;
    addMessage("You: " + input);
    document.getElementById("userInput").value = "";

    const model = document.getElementById("modelSelect").value;

    const response = await puter.ai.chat(input, { model: model });
    const text = response?.message?.content?.[0]?.text || "No response";
    addMessage("AI: " + text);
}

async function uploadFile() {
    const file = document.getElementById("fileInput").files[0];
    if (!file) return alert("Choose a file first");

    const text = await file.text();
    addMessage("You uploaded file: " + file.name);

    const model = document.getElementById("modelSelect").value;

    const response = await puter.ai.chat("Analyze this content:\n" + text, { model: model });
    const result = response?.message?.content?.[0]?.text || "No response";
    addMessage("AI: " + result);
}

async function uploadImage() {
    const file = document.getElementById("imageInput").files[0];
    if (!file) return alert("Choose an image");

    const reader = new FileReader();
    reader.onload = async function(e) {
        document.getElementById("preview").src = e.target.result;
        document.getElementById("preview").style.display = "block";

        const model = document.getElementById("modelSelect").value;

        const response = await puter.ai.chat("Describe this image:\n" + e.target.result, { model: model });
        const result = response?.message?.content?.[0]?.text || "No response";
        addMessage("AI: " + result);
    };
    reader.readAsDataURL(file);
}

function addMessage(msg) {
    const messages = document.getElementById("messages");
    messages.innerHTML += msg + "<br><br>";
    messages.scrollTop = messages.scrollHeight;
}
</script>

</body>
</html>
